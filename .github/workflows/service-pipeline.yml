name: Brown Biotech Service Pipeline

on:
  push:
    branches:
      - service
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_5A38L2LDJCytpQxQnneuHlfr
      VERCEL_PROJECT_ID: prj_sIpx8A0F5eHhKiDIv5TJUyAk8gVI
      NEXT_PUBLIC_SITE_URL: https://services.brownbio.tech
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: npx vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build Vercel output
        run: npx vercel@latest build --prod --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
