name: Brown Biotech Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: brown-biotech-main-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_SITE_URL: https://brownbio.tech
  MAIN_DOMAIN: brownbio.tech
  WWW_DOMAIN: www.brownbio.tech
  KR_DOMAIN: brownbio.co.kr

jobs:
  build-and-deploy:
    name: Build and deploy main site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Prepare Vercel project link
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_MAIN }}
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {"orgId":"$VERCEL_ORG_ID","projectId":"$VERCEL_PROJECT_ID"}
          EOF

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_JSON=$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" --json)
          echo "$DEPLOY_JSON"
          DEPLOY_URL=$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["url"])' <<< "$DEPLOY_JSON")
          echo "deployment_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Alias production domains
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment_url }}
        run: |
          vercel alias set "$DEPLOY_URL" "$MAIN_DOMAIN" --token "$VERCEL_TOKEN"
          vercel alias set "$DEPLOY_URL" "$WWW_DOMAIN" --token "$VERCEL_TOKEN"
          vercel alias set "$DEPLOY_URL" "$KR_DOMAIN" --token "$VERCEL_TOKEN"
