name: Brown Biotech Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_5A38L2LDJCytpQxQnneuHlfr
      VERCEL_PROJECT_ID: prj_sIpx8A0F5eHhKiDIv5TJUyAk8gVI
      NEXT_PUBLIC_SITE_URL: https://brownbio.tech
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: npx vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build Vercel output
        run: npx vercel@latest build --prod --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel
        run: |
          deployment_url=$(npx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN" | grep -oP 'https://[^ ]+\.vercel\.app')
          echo "Deployed to: $deployment_url"
          npx vercel@latest alias --token "$VERCEL_TOKEN" "$deployment_url" brownbio.tech
