name: Brown Biotech Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_MAIN }}
      NEXT_PUBLIC_SITE_URL: https://brownbio.tech
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vercel output
        run: npx vercel@latest build --prod --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"
